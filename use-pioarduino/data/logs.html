<div class='container'>
    <h2>Logs</h2>
    <table class='logs-table' style='width: 100%; border-collapse: collapse; margin-bottom: 20px;'>
        <tbody id='logs-table-body'></tbody>
    </table>
    <form action='/logs' method='DELETE'>
        <button class='btn danger'' type='button' onclick='clearLogs(this)'>Clear</button>
    </form>
    <form action='/' method='GET'>
        <button class='btn secondary''>Back</button>
    </form>

    <script>

        document.addEventListener('DOMContentLoaded', () => {
            loadLogs();
        });

        function loadLogs() {
            fetch('/api/logs')
            .then(response => response.json())
            .then(data => {
                const tableBody = document.getElementById('logs-table-body');
                tableBody.innerHTML = ''; // Clear loading state

                console.log("Fetched logs:", data);

                data.logs.reverse().forEach(entry => {
                    
                    statusIcon = "&#10003;";
                    statusString = "OK";
                    statusColor = 'var(--color-status-ok)'
                    if (entry.aborted) {
                        statusIcon = "&#10060;";
                        statusString = "Aborted";
                        statusColor = 'var(--color-status-error)';
                    } else if (entry.stallCount > 3) {
                        statusIcon = "&#10071;";
                        statusString = "Jammed";
                        statusColor = 'var(--color-status-error)';
                    } else if (entry.stallCount > 1) {
                        statusIcon = "&#9888;";
                        statusString = "Struggling";
                        statusColor = 'var(--color-status-warn2)';
                    } else if (entry.stallCount == 1) {
                        statusIcon = "&#9432;";
                        statusString = "Adjusted";
                        statusColor = 'var(--color-status-warn1)';
                    } 
                    fillColor = entry.fillLevel == 0 ? 'var(--color-status-error)' : (entry.fillLevel < 33 ? 'var(--color-status-warn2)' : 'var(--color-status-ok)');
                    fillIcon = entry.fillLevel == 0 ? "&#128308;" : (entry.fillLevel < 33 ? "&#128992;" : "&#128994;");

                    const row = document.createElement('tr');
                    timeString = new Date(entry.timestamp * 1000).toLocaleTimeString();
                    dateString = new Date(entry.timestamp * 1000).toLocaleDateString();
                    
                    row.setAttribute('class', "logs-row");
                    row.innerHTML = `
    
                            <td class style="padding: 10px; line-height: 1.2;">
                                <span style="font-weight: 700; color: #333;">${timeString}</span>
                                <span style="font-size: 0.7rem; color: #888; display: block;">${dateString}</span>
                            </td>

                            <td style="padding: 10px; color: #444; vertical-align: middle;">
                                <div style="display: flex; align-items: center;">
                                    <span style="margin-right: 6px; font-size: 1.1rem;">${entry.type == 'timer' ? '&#9201;&#65038;' : '&#9757;&#65038;'}</span>
                                    <div>${entry.type == "timer" ? "Timer" : "Manual"}</div>
                                </div>
                                <div style="display: flex; align-items: center;">

                                    <span style="margin-right: 6px; font-size: 1.1rem;">${entry.mode == "meal" ? "&#129379;" : "&#129460;"}</span>
                                    ${entry.mode == "meal" ? "Meal" : "Snack"}
                                </div>
                            </td>

                            <td style="padding: 10px; text-align: center; vertical-align: middle; width: 50px;">
                                <div>
                                    <span style="color: ${statusColor}; font-weight: 800; font-size:1.1rem;">${statusIcon}</span>
                                </div>
                                <div>
                                    <span style="color: ${statusColor}; font-weight: 800; font-size: 0.75rem;">${statusString}</span>
                                </div>
                            </td>
                            
                            <td style="padding: 10px;">
                                <div>
                                    <span style="font-size: 1.1rem; text-align: right; display: ${entry.fillLevel >= 0 ? 'block' : 'none'}">${fillIcon}</span>
                                </div>
                                <div>
                                    <span style="font-size: 0.75rem; text-align: right; color: #555; display: ${entry.fillLevel >= 0 ? 'block' : 'none'}">${entry.fillLevel}%</span>
                                </div>
                            </td


                    `;
                    tableBody.appendChild(row);
                });
            });
        }

        function clearLogs(buttonElement) {
            console.log("Clearing logs");
            fetch('/logs', {
                method: 'DELETE'
            }).then(response => {
                loadLogs();
            });
        }

        setTimeout(() => {
            loadLogs();
        }, 30000);
    </script>
</div>
